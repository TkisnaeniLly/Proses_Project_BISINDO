<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Translate Bahasa Isyarat</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="fade-in realtime-page">

  <!-- TOP MENU -->
  <div class="top-menu">
    <a href="#">Akun</a>
    <a href="#">Tentang Kami</a>
  </div>

  <!-- NAVBAR -->
  <nav class="main-nav">
    <a href="/">Home</a>

    <div class="nav-dropdown">
      <a href="#" class="active">Translate</a>
      <div class="dropdown-content">
        <a href="/translate/realtime">Real-Time</a>
        <a href="/translate/upload">Upload Gambar</a>
      </div>
    </div>

    <a href="/tutorial">Tutorial</a>
  </nav>

  <!-- HEADER -->
  <header class="floating">
    <h1>Sistem Translasi Bahasa Isyarat</h1>
    <p>Grup Kartini ✨</p>
  </header>

  <!-- TRANSLATE REALTIME -->
  <section class="translate-section">
    <h2 class="section-title">Translate Real-Time</h2>
    <p class="section-desc">
      Pastikan tangan terlihat jelas di area kamera.
    </p>

    <div class="translate-container">

     <!-- CAMERA -->
<div class="camera-box realtime-camera">
  <video id="video" autoplay muted playsinline></video>

  <!-- LOADING TENGAH -->
  <div id="loading" class="loader-center">
    <div class="spinner"></div>
    <p>Mengaktifkan kamera...</p>
  </div>
</div>


    </div>

    <!-- BUTTON -->
    <button id="toggleCam" class="btn-start">Start</button>
  </section>

  <!-- SCRIPT CAMERA -->
  <script>
    const video = document.getElementById("video");
    const loading = document.getElementById("loading");
    const toggleBtn = document.getElementById("toggleCam");

    let stream = null;
    let isCameraOn = false;

    toggleBtn.addEventListener("click", async () => {
      if (!isCameraOn) {
        try {
          loading.style.display = "block";

          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" }
          });

          video.srcObject = stream;
          video.style.display = "block";
          loading.style.display = "none";

          toggleBtn.textContent = "Stop";
          isCameraOn = true;
        } catch (err) {
          alert("Kamera tidak bisa diakses!");
        }
      } else {
        stream.getTracks().forEach(track => track.stop());
        video.style.display = "none";
        toggleBtn.textContent = "Start";
        isCameraOn = false;
      }
    });
  </script>

  <!-- FOOTER -->
  <footer>
    Gunakan Website kami dengan bijak!
  </footer>

</body>
</html>
